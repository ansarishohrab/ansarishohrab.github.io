<app-header></app-header>
<div class="container">
  <form>
    <div class="card">
      <div class="card-header" id="headingOne">
        <h5 class="mb-0">
          Basic details
        </h5>
      </div>

      <div class="card-body">
        <div class="form-group">
          <label for="firstname">First Name</label>
          <input type="text" class="form-control" id="firstname" placeholder="Enter First Name">
        </div>
        <div class="form-group">
          <label for="lastname">Last Name</label>
          <input type="text" class="form-control" id="lastname" placeholder="Enter Last Name">
        </div>
        <div class="form-group">
          <label for="designation">Designation</label>
          <input type="text" class="form-control" id="designation" placeholder="Enter Designation">
        </div>
        <div class="form-group">
          <label for="description">Description</label>
          <textarea class="form-control" id="description" rows="3" placeholder="Enter about your self"></textarea>
        </div>
        <div class="form-group">
          <label for="country">Country</label>
          <ngx-select-dropdown id="country" [config]="countryDropConfig" [options]="countryOptions"(change)="countryChanged($event)">
          </ngx-select-dropdown>
        </div>
        <div class="form-group">
          <label for="state">State</label>
          <ngx-select-dropdown id="state" [config]="stateDropConfig" [options]="stateOptions"
            (change)="stateChanged($event)">
          </ngx-select-dropdown>
        </div>

        <div class="form-group">
          <label for="city">City</label>
          <ngx-select-dropdown id="city" [config]="cityDropConfig" [options]="cityOptions">
          </ngx-select-dropdown>
        </div>


        <button type="submit" class="btn btn-primary">Submit</button>
      </div>
    </div>
  </form>
</div>
