<aside class="info aside section">
  <div class="section-inner shadow-sm rounded">
    <h2 class="heading sr-only">Basic Information</h2>
    <div class="content">
      <ul class="list-unstyled">
        <li><i class="fas fa-map-marker-alt"></i><span class="sr-only">Location:</span>{{portFolioData.city}},
          {{portFolioData.country}}</li>
        <li><i class="fas fa-envelope"></i><span class="sr-only">Email:</span><a
            href="javascript:void(0)">{{portFolioData.email}}</a>
        </li>
        <li><i class="fas fa-phone"></i><span class="sr-only">Phone:</span><a
            href="javascript:void(0)">{{portFolioData.phone}}</a></li>
      </ul>
    </div>
    <div class="d-flex justify-content-end">
      <button class="btn" (click)="editDetails()"><i class="fas fa-edit"></i></button>
    </div>

  </div>
</aside>
