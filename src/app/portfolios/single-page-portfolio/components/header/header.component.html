<!-- ******HEADER****** -->
<header class="header">
  <div class="container clearfix">
    <img class="profile-image img-fluid float-left rounded-circle" [src]="portFolioData.userProfile.profileImage"
      alt="profile image" />
    <div class="profile-content float-left">
      <h1 class="name">{{portFolioData.userProfile.firstname}} {{portFolioData.userProfile.lastname}}</h1>
      <h2 class="desc">{{portFolioData.userProfile.designation}}</h2>
      <ul class="social list-inline">
        <li *ngFor="let socialData of portFolioData.socialMediaInfo"  class="list-inline-item"><a [href]="socialData.redirectionLink" target="_blank"><i [class]="socialData.iconClass"></i></a></li>
      </ul>
    </div>
    <!--//profile-->
  </div>
  <!--//container-->
</header>
<!--//header-->
