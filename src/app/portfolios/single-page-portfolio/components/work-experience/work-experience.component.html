<section class="experience section">
  <div class="section-inner shadow-sm rounded">
    <h2 class="heading">Work Experience</h2>
    <div class="content">
      <div class="item" *ngFor="let experience of portFolioData.Experiences">
        <h3 class="title">{{experience.designation}} - <span class="place"><a href="#">{{experience.company}}</a></span>
          <span class="year">({{experience.joiningDate | date}} - {{experience.endDate | date}})</span>
        </h3>
        <p>{{experience.description}}</p>
      </div>
    </div>
    <div class="d-flex justify-content-end">
      <button class="btn" (click)="editDetails()"><i class="fas fa-edit"></i></button>
    </div>
  </div>
</section>
