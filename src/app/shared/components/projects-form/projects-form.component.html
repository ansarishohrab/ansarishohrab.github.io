<form [formGroup]='registerForm'>
  <div class="card-body">
    <div class="d-flex flex-column" formArrayName="projects">
      <ng-container *ngFor="let project of getProjectsArray().controls; index as proIndex">
        <div class="d-flex" [formGroupName]="proIndex">
          <div class="form-group w-100 m-2">
            <label for="projectTitle">Title</label>
            <input type="text" class="form-control" id="projectTitle" formControlName="title"
              placeholder="Enter project title">
            <small
              *ngIf="(project.controls['title'].dirty || project.controls['title'].touched || submitted) && project.controls['title'].errors?.required"
              class="p-error">Please enter title</small>
          </div>
          <div class="form-group w-100 m-2">
            <label for="projDescription">Description</label>
            <textarea class="form-control" id="projDescription" rows="3" formControlName="description"
              placeholder="Enter project description"></textarea>
            <small
              *ngIf="(project.controls['description'].dirty || project.controls['description'].touched || submitted) && project.controls['description'].errors?.required"
              class="p-error">Please enter description</small>
          </div>
        </div>
      </ng-container>
      <div class="d-flex justify-content-end">
        <button pButton pRipple type="button" icon="pi pi-plus" class="p-button-rounded p-button-outlined float-right"
          (click)="addProjectRow()"></button>
      </div>
      <button pButton type="button" label="Submit" class="p-button-outlined m-2" (click)="onSubmit()"
        *ngIf="config.data"></button>
    </div>
  </div>
</form>
